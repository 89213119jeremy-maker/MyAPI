<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>我的第一個前端網頁</title>
</head>

<body>

    <!-- 1. 網頁的大標題 -->
    <h1>商品展示後台</h1>

    <!-- 2. 一顆按鈕，點擊時會去執行叫作 loadProducts 的 JavaScript 功能 -->
    <button onclick="loadProducts()">更新商品清單</button>

    <!-- 3. 一個空的清單標籤 (ul)，我們會用 JavaScript 把商品一筆一筆塞進這裡 -->
    <ul id="productList">
        <li>等待載入商品...</li>
    </ul>

    <script>
        // 建立一個功能，專門用來跟後端要資料
        async function loadProducts() {
            try {
                // 1. 用 fetch 去敲 C# 後端的門，把商品資料抓回來
                // 這裡的 5211 要配合你 C# 終端機顯示的數字喔！
                console.log('開始載入商品...');
                const response = await fetch('http://localhost:5211/api/products');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // 2. 把拿到的資料，轉換成網頁看得懂的 C# 物件/陣列格式
                const products = await response.json();
                console.log('成功取得商品資料:', products);

                // 3. 抓到網頁上那個叫作 "productList" 的空位
                const listElement = document.getElementById('productList');

                // 先把裡面的「等待載入商品...」清空
                listElement.innerHTML = '';

                // 如果沒有商品
                if (!products || products.length === 0) {
                    listElement.innerHTML = '<li>目前沒有商品</li>';
                    return;
                }

                // 4. 用迴圈把每一筆商品倒出來，做成新的 <li> 標籤塞進網頁
                products.forEach(product => {
                    const li = document.createElement('li');
                    li.style.listStyle = 'none';       // 去掉項目符號
                    li.style.marginBottom = '20px';     // 每個商品之間的間距

                    // 先建立圖片（放在上面）
                    const img = document.createElement('img');
                    img.src = 'http://localhost:5211' + product.imageUrl;
                    img.alt = product.name;
                    img.style.width = '300px';
                    img.style.height = '300px';
                    img.style.objectFit = 'cover';      // 等比例裁切填滿，不變形
                    img.style.display = 'block';        // 圖片獨佔一行

                    // 如果是耳機，依照原始比例顯示，寬度縮小一倍
                    if (product.imageUrl.includes('earphone')) {
                        img.style.width = '150px';
                        img.style.height = 'auto';
                        img.style.objectFit = 'contain';
                    }

                    li.appendChild(img);                // 先放圖片

                    // 再建立文字（放在下面）
                    const text = document.createElement('span');
                    text.innerText = product.name + " ─ $" + product.price + "元";
                    li.appendChild(text);               // 再放文字

                    listElement.appendChild(li);
                });

            } catch (error) {
                console.error('錯誤:', error);
                document.getElementById('productList').innerHTML = '<li style="color: red;">❌ 無法連接後端，請檢查：<br>1. 後端是否正在運行 (dotnet run)<br>2. 埠號是否正確 (5211)<br>3. 瀏覽器Console有無錯誤訊息</li>';
            }
        }

        // 這行是告訴瀏覽器：「網頁一打開的時候，就自動幫我執行上面這個功能」
        window.onload = loadProducts;
    </script>

</body>

</html>
